    async function sha256Hex(text) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
    }

    function xorDecode(encoded, key) {
      const raw = atob(encoded);
      let out = "";
      for (let i = 0; i < raw.length; i++) {
        out += String.fromCharCode(raw.charCodeAt(i) ^ key.charCodeAt(i % key.length));
      }
      return out;
    }

    async function init() {
      const params = new URLSearchParams(location.search);
      const urlToken = params.get("t");
      const urlExp = Number(params.get("e") || "0");
      const urlSalt = params.get("s") || "";
      const now = Math.floor(Date.now() / 1000);

      const status = document.getElementById("auth-status");

      if (!urlToken || !urlSalt || !urlExp) { status.textContent = "ERR: Missing parameters."; return; }
      
      let data;
      try {
          const decoded = xorDecode(ENCODED, urlToken + urlSalt);
          data = JSON.parse(decoded);
      } catch (e) { status.textContent = "ERR: Payload corruption."; return; }

      // Signature verification
      const sigCheck = await sha256Hex(`${data.project}|${data.id}|${data.token}|${data.exp}|${data.salt}`);
      if (sigCheck !== data.sig || urlToken !== data.token || urlSalt !== data.salt) {
          status.textContent = "ERR: Signature mismatch."; return;
      }
      if (now > data.exp) { status.textContent = "ERR: Token expired."; return; }

      // LocalStorage duplicate check (Fingerprinting concept)
      const storageKey = `ref_visited_${data.id}`;
      if (localStorage.getItem(storageKey)) {
          status.textContent = "ERR: Data already accessed in this environment."; return;
      }
      localStorage.setItem(storageKey, "1");

      // Render content
      document.getElementById("c-title").textContent = data.title;
      document.getElementById("c-desc").textContent = data.desc;
      document.getElementById("c-img").src = data.imageRel;
      document.getElementById("c-link").href = data.targetUrl;
      
      status.style.display = "none";
      document.getElementById("content").style.display = "block";
      
      // Clean URL
      history.replaceState({}, "", location.pathname);
    }
    
    init();
